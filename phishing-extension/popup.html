<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            font-family: 'Inter', Arial, sans-serif;
            padding: 15px;
            width: 320px;
            background: #1e1e2e;
            color: #cdd6f4;
            margin: 0;
        }

        .header {
            border-bottom: 1px solid #313244;
            padding-bottom: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .header h3 {
            margin: 0;
            color: #cba6f7;
            font-weight: 600;
            font-size: 16px;
        }

        .url-box {
            background: #181825;
            padding: 10px;
            border-radius: 6px;
            word-wrap: break-word;
            font-size: 12px;
            border: 1px solid #313244;
            margin-bottom: 15px;
            color: #a6adc8;
            max-height: 45px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .result-box {
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
            font-size: 15px;
        }

        .status-checking {
            background: #313244;
            color: #a6adc8;
            border: 1px solid #45475a;
        }

        .status-safe {
            background: rgba(166, 227, 161, 0.1);
            color: #a6e3a1;
            border: 1px solid #a6e3a1;
        }

        .status-suspicious {
            background: rgba(249, 226, 175, 0.1);
            color: #f9e2af;
            border: 1px solid #f9e2af;
        }

        .status-phishing {
            background: rgba(243, 139, 168, 0.1);
            color: #f38ba8;
            border: 1px solid #f38ba8;
        }

        #score-container {
            margin-top: 15px;
            display: none;
        }

        .score-bar-bg {
            background: #313244;
            height: 8px;
            border-radius: 4px;
            width: 100%;
            overflow: hidden;
            margin-bottom: 5px;
        }

        .score-bar {
            height: 100%;
            width: 0%;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .score-text {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #bac2de;
            font-weight: 500;
        }

        .reasons {
            margin-top: 15px;
            font-size: 12px;
            padding-left: 20px;
            color: #bac2de;
            display: none;
        }

        .reasons li {
            margin-bottom: 6px;
        }

        .error-msg {
            color: #f38ba8;
            font-size: 11px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }
    </style>
</head>

<body>
    <div class="header">
        <h3> Sentinel-Fuzz</h3>
    </div>
    <div class="url-box" id="url" title="Capturing URL...">Capturing URL...</div>
    <div class="result-box status-checking" id="result-box">
        <span id="result-text">Analyzing Site...</span>
    </div>

    <div id="score-container">
        <div class="score-bar-bg">
            <div id="score-bar" class="score-bar"></div>
        </div>
        <div class="score-text">
            <span>Risk Score</span>
            <span id="score-value">0/100</span>
        </div>
    </div>

    <ul class="reasons" id="reasons-list"></ul>
    <div style="text-align: center; margin-top: 15px;">
        <button id="gemini-btn"
            style="background:#cba6f7; color:#11111b; border:none; padding:8px 12px; border-radius:4px; font-weight:bold; cursor:pointer; width: 100%;">🤖
            Trigger AI Analysis</button>
    </div>
    <div id="gemini-result"
        style="margin-top: 10px; font-size:12px; color:#cdd6f4; display:none; padding:10px; background:#181825; border-radius:6px; border: 1px solid #313244; word-wrap: break-word;">
    </div>

    <div id="error-msg" class="error-msg">Make sure Sentinel-Fuzz backend is running on port 8080.</div>

    <script src="popup.js"></script>
</body>

</html>
