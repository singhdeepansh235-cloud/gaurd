{% extends "base.html" %}

{% block title %}{{ error }} — Sentinal-Fuzz{% endblock %}

{% block content %}
<div class="error-page">
    <div class="error-code">404</div>
    <h2 class="mt-16">{{ error|default('Page Not Found') }}</h2>
    <p class="mt-8 mb-24">{{ message|default('The page you are looking for does not exist.') }}</p>
    <a href="/" class="btn btn-primary btn-lg">← Back to Dashboard</a>
</div>
{% endblock %}
